<!doctype html>
<html lang="en" data-theme="{{ theme|default('light') }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}{% if active_page %} | {{ active_page|replace('_',' ')|title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/592-brand.css') }}" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  {% if navbar|default(True) %}
  <header class="topbar glass">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-badge">592</span>
      <span>
        <strong>592 Branding</strong>
        <small>592-Cam</small>
      </span>
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('image_gallery') }}">Gallery</a>
      <a href="{{ url_for('system_settings') }}">System</a>
      <a href="{{ url_for('about') }}">About</a>
    </nav>
  </header>
  {% endif %}
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <span>{{ title }}</span>
    <span>Version {{ version }}</span>
  </footer>
  <script src="{{ url_for('static', filename='js/592-cam.js') }}"></script>
</body>
</html>
